<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a0e14;font-family:'IBM Plex Mono','Courier New',monospace;color:#e2e8f0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#131921;border:1px solid #2a3850;border-radius:8px;padding:48px 52px;width:420px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.logo{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#00b4d8;margin-bottom:28px}
.logo span{color:#2a3850}
h1{font-size:20px;font-weight:700;color:#e2e8f0;margin-bottom:6px;letter-spacing:-.02em;font-family:'IBM Plex Sans','Segoe UI',sans-serif}
.sub{font-size:11px;color:#4a5f78;margin-bottom:36px;line-height:1.6}
label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#7a8ba0;display:block;margin-bottom:8px}
.input-wrap{position:relative;margin-bottom:10px}
input[type=password],input[type=text]{width:100%;background:#0a0e14;border:1px solid #2a3850;border-radius:4px;color:#e2e8f0;font-family:'IBM Plex Mono','Courier New',monospace;font-size:16px;padding:12px 44px 12px 14px;outline:none;transition:border-color .15s;letter-spacing:.08em}
input:focus{border-color:#00b4d8}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#4a5f78;font-size:16px;padding:4px;line-height:1}
.eye:hover{color:#7a8ba0}
button.submit{width:100%;background:#00b4d8;color:#0a0e14;border:none;border-radius:4px;font-family:'IBM Plex Mono','Courier New',monospace;font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:13px;cursor:pointer;margin-top:8px;transition:opacity .15s,transform .1s}
button.submit:hover{opacity:.88;transform:translateY(-1px)}
button.submit:disabled{opacity:.5;cursor:not-allowed}
.err{display:none;margin-top:14px;padding:10px 14px;background:rgba(239,71,111,.1);border:1px solid rgba(239,71,111,.3);border-radius:4px;font-size:11px;color:#ef476f;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.progress{display:none;margin-top:16px;font-size:11px;color:#4a5f78;text-align:center;letter-spacing:.06em}
.foot{margin-top:32px;padding-top:20px;border-top:1px solid #1c2535;font-size:10px;color:#2a3850;text-align:center;line-height:1.7}
</style>
</head><body>

  <label for="pw">Passwort</label>
  <div class="input-wrap">

  </div>
  <button class="submit" id="btn" onclick="unlock()">Öffnen</button>
  <div class="err" id="err">Falsches Passwort – bitte erneut versuchen.</div>

function b64(s){const b=atob(s.replace(/\s+/g,''));const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
function togglePw(btn){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';i.focus();}

async function tryDecrypt(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(SALT),iterations:100000,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']
  );
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(pt);
}

// After rendering: intercept all navigations to internal .html files
// and append #pw=... so the destination can auto-decrypt
function installPwForwarding(pw){
  const enc=encodeURIComponent(pw);
  // Intercept <a href="*.html"> clicks
  document.addEventListener('click',function(e){
    const a=e.target.closest('a[href]');
    if(!a)return;
    const href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('mailto'))return;
    if(href.endsWith('.html')||href.includes('.html#')){
      e.preventDefault();
      const base=href.split('#')[0];
      window.location.href=base+'#pw='+enc;
    }
  },true);
  // Also patch window.location.href assignments via a setter trick on history
  // and intercept the theme-toggle onclick pattern
  const origAssign=window.location.assign.bind(window.location);
  // Patch onclick-based navigation: wrap window.location setter
  // We do this by monitoring clicks on #theme-toggle specifically
  document.addEventListener('click',function(e){
    if(e.target.id==='theme-toggle'||e.target.closest('#theme-toggle')){
      e.stopImmediatePropagation();
      e.preventDefault();
      const cur=window.location.pathname.split('/').pop()||'index.html';
      const dest=cur.indexOf('_hell')>=0?cur.replace('_hell.html','.html'):cur.replace('.html','_hell.html');
      window.location.href=dest+'#pw='+enc;
    }
  },true);
}

async function render(html, pw){
  document.open();document.write(html);document.close();
  // Inject navigation bar into the rendered page
  injectNavBar(pw);
  // After document.write the DOM is ready synchronously
  installPwForwarding(pw);
}

function injectNavBar(pw){
  const enc=encodeURIComponent(pw);
  const cur=window.location.pathname.split('/').pop()||'index.html';
  const isHell=cur.indexOf('_hell')>=0;
  const isDark=!isHell;
  function href(base){
    const fname=(isHell?base+'_hell':base)+'.html';
    return fname+'#pw='+enc;
  }
  function isActive(base){
    return new RegExp('^'+base+'(_hell)?\\.html$').test(cur);
  }
  const themeDest=(isHell?cur.replace('_hell.html','.html'):cur.replace('.html','_hell.html'))+'#pw='+enc;
  const themeLabel=isHell?'Dunkel':'Hell';

  const bar=document.createElement('nav');
  bar.id='tbhh-navbar';
  bar.innerHTML=`
    <a href="${href('index')}"${isActive('index')?' class="active"':''}>Portal</a>
    <a href="${href('tbhhstat')}"${isActive('tbhhstat')?' class="active"':''}>Bericht 2017–2025</a>
    <a href="${href('tbhhmap')}"${isActive('tbhhmap')?' class="active"':''}>Karte</a>
    <a href="${href('tbhhrki')}"${isActive('tbhhrki')?' class="active"':''}>RKI-Vergleich</a>
    <a href="${href('tbhh2025')}"${isActive('tbhh2025')?' class="active"':''}>Jahresbericht 2025</a>
    <span class="tbhh-div"></span>
    <button id="tbhh-theme" onclick="window.location.href='${themeDest}'">${themeLabel}</button>
  `;

  const txt =isDark?'#5a7a96':'#6a8aaa';
  const act =isDark?'#00b4d8':'#005f8a';
  const actBg=isDark?'rgba(0,180,216,.12)':'rgba(0,95,138,.09)';
  const bg  =isDark?'rgba(10,14,20,0.88)':'rgba(245,249,255,0.90)';
  const bdr =isDark?'rgba(42,56,80,0.55)':'rgba(180,200,228,0.55)';
  const div =isDark?'rgba(42,56,80,0.8)' :'rgba(180,200,228,0.8)';

  const style=document.createElement('style');
  style.textContent=`
    #tbhh-navbar{
      position:fixed;top:12px;right:14px;z-index:99999;
      display:flex;flex-direction:row;align-items:center;gap:0;
      background:${bg};
      border:1px solid ${bdr};
      border-radius:8px;
      padding:3px 4px;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      box-shadow:0 2px 16px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.18);
      font-family:'IBM Plex Mono','Courier New',monospace;
      font-size:10px;letter-spacing:.04em;
      opacity:0.72;
      transition:opacity .25s;
    }
    #tbhh-navbar:hover{opacity:1;}
    #tbhh-navbar a{
      color:${txt};text-decoration:none;
      padding:4px 9px;border-radius:5px;
      white-space:nowrap;
      transition:background .15s,color .15s;
    }
    #tbhh-navbar a:hover{background:${actBg};color:${act};}
    #tbhh-navbar a.active{color:${act};font-weight:600;}
    #tbhh-navbar .tbhh-div{
      width:1px;height:10px;background:${div};margin:0 2px;flex-shrink:0;
    }
    #tbhh-navbar #tbhh-theme{
      color:${txt};background:none;border:none;cursor:pointer;
      font-family:inherit;font-size:10px;letter-spacing:.04em;
      padding:4px 9px;border-radius:5px;white-space:nowrap;
      transition:background .15s,color .15s;
    }
    #tbhh-navbar #tbhh-theme:hover{background:${actBg};color:${act};}
  `;
  document.head.appendChild(style);
  document.body.appendChild(bar);
  // Re-check isHell after document.write in case location changed
  var realCur=window.location.pathname.split('/').pop()||'index.html';
  var realIsHell=realCur.indexOf('_hell')>=0;
  var btn=document.getElementById('tbhh-theme');
  if(btn) btn.textContent=realIsHell?'Dunkel':'Hell';
}

async function unlock(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  document.getElementById('err').style.display='none';
  document.getElementById('prog').style.display='block';
  document.getElementById('btn').disabled=true;
  try{
    const html=await tryDecrypt(pw);
    await render(html,pw);
  }catch(e){
    document.getElementById('prog').style.display='none';
    document.getElementById('btn').disabled=false;
    const err=document.getElementById('err');
    err.style.display='block';err.style.animation='none';
    void err.offsetWidth;err.style.animation='shake .3s ease';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}

(async()=>{
  // Read password from URL hash if forwarded from another page
  const hash=window.location.hash;
  if(hash.startsWith('#pw=')){
    const pw=decodeURIComponent(hash.slice(4));
    history.replaceState(null,'',window.location.pathname+window.location.search);
    try{
      const html=await tryDecrypt(pw);
      await render(html,pw);
      return;
    }catch(e){}
  }
  document.getElementById('pw').focus();
})();
</script>
